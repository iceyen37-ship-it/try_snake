<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>辣妹電馭蛇 // GAL SERPENT</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Share+Tech+Mono&family=Pacifico&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-void:#180018;
    --bg-panel:#1f0620;
    --grid-line:#3a0f38;
    --neon-cyan:#00f6ff;
    --neon-magenta:#ff2bd6;
    --hot-pink:#ff0099;
    --baby-pink:#ffaee2;
    --gold:#ffd93d;
    --neon-yellow:#ffd93d;
    --neon-purple:#b967ff;
    --neon-red:#ff2b4d;
    --text-dim:#d6a8d8;
  }

  *{ box-sizing:border-box; -webkit-tap-highlight-color: transparent; }

  html,body{
    margin:0; padding:0; height:100%;
    background:
      radial-gradient(ellipse at 20% 0%, #4a0a4a 0%, transparent 55%),
      radial-gradient(ellipse at 85% 100%, #2e0630 0%, transparent 55%),
      radial-gradient(ellipse at 50% 50%, #3a0838 0%, transparent 70%),
      var(--bg-void);
    color:var(--text-dim);
    font-family:'Share Tech Mono', monospace;
    overflow:hidden;
    display:flex;
    align-items:center;
    justify-content:center;
  }

  /* scanline + vignette overlay */
  .crt{
    position:fixed; inset:0; pointer-events:none; z-index:50;
    background: repeating-linear-gradient(
      0deg, rgba(0,0,0,0.18) 0px, rgba(0,0,0,0.18) 1px,
      transparent 2px, transparent 3px
    );
    mix-blend-mode:overlay;
  }
  .vignette{
    position:fixed; inset:0; pointer-events:none; z-index:51;
    box-shadow: inset 0 0 18vw 4vw rgba(0,0,0,0.75);
  }

  /* ambient glitter */
  .glitter{
    position:fixed; inset:0; pointer-events:none; z-index:2; overflow:hidden;
  }
  .glitter span{
    position:absolute;
    width:3px; height:3px;
    background:var(--gold);
    border-radius:50%;
    box-shadow:0 0 6px 1px var(--gold);
    animation: twinkle 3.5s ease-in-out infinite;
    opacity:0;
  }
  @keyframes twinkle{
    0%,100%{ opacity:0; transform:scale(0.5); }
    50%{ opacity:1; transform:scale(1.3); }
  }

  .stage{
    position:relative;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:14px;
    padding:18px 22px 22px;
    z-index:1;
    width:min(92vw, 560px);
  }

  /* ---- Title ---- */
  .title-wrap{
    text-align:center;
    user-select:none;
  }
  .eyebrow{
    font-size:10px;
    letter-spacing:0.4em;
    color:var(--gold);
    opacity:0.85;
    margin-bottom:4px;
    font-family:'Share Tech Mono', monospace;
  }
  .eyebrow .heart{ color:var(--hot-pink); }
  h1{
    font-family:'Orbitron', sans-serif;
    font-weight:900;
    font-size:clamp(24px, 5.6vw, 38px);
    margin:0;
    letter-spacing:0.04em;
    color:#fff;
    position:relative;
    text-shadow:
      0 0 6px var(--hot-pink),
      0 0 18px var(--hot-pink),
      0 0 42px rgba(255,0,153,0.55);
    animation: flicker 6s infinite;
  }
  h1 .cute{
    font-family:'Pacifico', cursive;
    font-weight:400;
    font-size:0.72em;
    color:var(--gold);
    text-shadow:0 0 6px var(--gold), 0 0 18px var(--gold), 0 0 34px rgba(255,217,61,0.6);
    vertical-align:middle;
  }
  h1 .accent{ color:var(--neon-purple); text-shadow:0 0 6px var(--neon-purple),0 0 18px var(--neon-purple),0 0 40px rgba(185,103,255,0.55); }

  @keyframes flicker{
    0%,3%,6%,100%{ opacity:1; }
    4%{ opacity:0.7; }
    5%{ opacity:0.95; }
    45%{ opacity:1; }
    46%{ opacity:0.55; }
    47%{ opacity:1; }
  }

  /* ---- HUD ---- */
  .hud{
    width:100%;
    display:flex;
    justify-content:space-between;
    align-items:flex-end;
    font-family:'Orbitron', sans-serif;
    padding:0 2px;
  }
  .hud-block{ display:flex; flex-direction:column; gap:2px; }
  .hud-label{ font-size:9px; letter-spacing:0.3em; color:var(--text-dim); }
  .hud-value{
    font-size:20px; font-weight:700; color:var(--gold);
    text-shadow:0 0 8px rgba(255,217,61,0.7);
    min-width:3ch;
  }
  .hud-value.hi{ color:var(--hot-pink); text-shadow:0 0 8px rgba(255,0,153,0.7); }

  /* ---- Game frame ---- */
  .frame{
    position:relative;
    padding:3px;
    border-radius:10px;
    background: linear-gradient(135deg, var(--gold), var(--hot-pink), var(--neon-purple));
    box-shadow:
      0 0 24px rgba(255,0,153,0.55),
      0 0 60px rgba(185,103,255,0.2);
  }
  canvas{
    display:block;
    width:100%;
    aspect-ratio:1/1;
    background:
      repeating-linear-gradient(0deg, transparent, transparent 24px, rgba(255,255,255,0.02) 25px),
      var(--bg-panel);
    border-radius:8px;
    image-rendering: pixelated;
  }

  /* ---- Overlay (start / game over) ---- */
  .overlay{
    position:absolute; inset:3px;
    background:rgba(24,0,24,0.9);
    border-radius:7px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:14px;
    text-align:center;
    padding:20px;
    backdrop-filter: blur(1px);
    transition:opacity 0.25s ease;
  }
  .overlay.hidden{ opacity:0; pointer-events:none; }
  .overlay h2{
    font-family:'Orbitron',sans-serif;
    color:#fff;
    font-size:clamp(18px,4.5vw,26px);
    margin:0;
    letter-spacing:0.08em;
    text-shadow:0 0 10px var(--neon-red), 0 0 30px rgba(255,43,77,0.6);
  }
  .overlay p{ margin:0; font-size:12px; letter-spacing:0.08em; line-height:1.7; color:var(--text-dim); }
  .overlay .kbd{ color:var(--gold); }

  .btn{
    font-family:'Orbitron', sans-serif;
    font-size:12px;
    letter-spacing:0.15em;
    padding:12px 30px;
    background:linear-gradient(135deg, rgba(255,0,153,0.15), rgba(185,103,255,0.15));
    color:var(--hot-pink);
    border:1px solid var(--hot-pink);
    border-radius:999px;
    cursor:pointer;
    text-transform:uppercase;
    box-shadow:0 0 14px rgba(255,0,153,0.5), inset 0 0 12px rgba(255,0,153,0.1);
    transition: all 0.15s ease;
  }
  .btn:hover{ background:rgba(255,0,153,0.22); box-shadow:0 0 24px rgba(255,0,153,0.8), inset 0 0 16px rgba(255,0,153,0.25); transform:translateY(-1px); }
  .btn:active{ transform:scale(0.96); }

  /* ---- Touch controls ---- */
  .touch-pad{
    display:none;
    grid-template-columns:repeat(3, 56px);
    grid-template-rows:repeat(3, 56px);
    gap:6px;
    justify-content:center;
    margin-top:4px;
  }
  .touch-pad button{
    background:rgba(255,0,153,0.08);
    border:1px solid var(--hot-pink);
    color:var(--hot-pink);
    border-radius:10px;
    font-size:18px;
    box-shadow:0 0 8px rgba(255,0,153,0.35);
  }
  .touch-pad button:active{ background:rgba(255,0,153,0.3); }
  #tp-up{ grid-column:2; grid-row:1; }
  #tp-left{ grid-column:1; grid-row:2; }
  #tp-right{ grid-column:3; grid-row:2; }
  #tp-down{ grid-column:2; grid-row:3; }

  @media (hover:none) and (pointer:coarse){
    .touch-pad{ display:grid; }
  }

  .footer-tip{
    font-size:10px;
    letter-spacing:0.15em;
    color:var(--text-dim);
    opacity:0.6;
    text-align:center;
  }
</style>
</head>
<body>

<div class="crt"></div>
<div class="vignette"></div>
<div class="glitter" id="glitter"></div>

<div class="stage">
  <div class="title-wrap">
    <div class="eyebrow"><span class="heart">♥</span> NIGHT CITY GAL CLUB <span class="heart">♥</span></div>
    <h1>辣妹電馭<span class="accent">蛇</span> <span class="cute">Gal Serpent</span></h1>
  </div>

  <div class="hud">
    <div class="hud-block">
      <span class="hud-label">DATA 資料</span>
      <span class="hud-value" id="score">000</span>
    </div>
    <div class="hud-block" style="align-items:flex-end;">
      <span class="hud-label">MAX 紀錄</span>
      <span class="hud-value hi" id="highscore">000</span>
    </div>
  </div>

  <div class="frame">
    <canvas id="game" width="440" height="440"></canvas>

    <div class="overlay" id="overlay">
      <h2 id="overlay-title">準備登場 // STANDBY</h2>
      <p>用 <span class="kbd">方向鍵</span> 或 <span class="kbd">WASD</span> 甩尾滑進舞池<br>吃愛心閃粉讓身材更加分<br>別撞牆，別咬到自己的裙擺</p>
      <button class="btn" id="start-btn">出發 START ✨</button>
    </div>
  </div>

  <div class="touch-pad" id="touch-pad">
    <button id="tp-up">▲</button>
    <button id="tp-left">◀</button>
    <button id="tp-right">▶</button>
    <button id="tp-down">▼</button>
  </div>

  <div class="footer-tip">✨ SPACE 暫停 / 重新啟動請按 START ✨</div>
</div>

<script>
(function(){
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const COLS = 22, ROWS = 22;
  let CELL = canvas.width / COLS;

  const scoreEl = document.getElementById('score');
  const highEl = document.getElementById('highscore');
  const overlay = document.getElementById('overlay');
  const overlayTitle = document.getElementById('overlay-title');
  const startBtn = document.getElementById('start-btn');

  const COLOR_HEAD = '#ffe1f5';
  const COLOR_BODY_A = '#b967ff';
  const COLOR_BODY_B = '#ff0099';
  const COLOR_BODY_C = '#ffd93d';
  const COLOR_FOOD = '#ff0099';
  const COLOR_FOOD_GLOW = '#ffd93d';
  const COLOR_GRID = 'rgba(185,103,255,0.10)';

  let snake, dir, nextDir, food, score, high, running, paused, tickMs, loopHandle, particles;

  high = parseInt(localStorage.getItem('neonSerpentHigh') || '0', 10);
  highEl.textContent = String(high).padStart(3,'0');

  function resetState(){
    const midX = Math.floor(COLS/2), midY = Math.floor(ROWS/2);
    snake = [
      {x:midX-1,y:midY},
      {x:midX-2,y:midY},
      {x:midX-3,y:midY}
    ];
    dir = {x:1,y:0};
    nextDir = {x:1,y:0};
    score = 0;
    tickMs = 130;
    particles = [];
    placeFood();
    scoreEl.textContent = '000';
  }

  function placeFood(){
    let valid = false;
    while(!valid){
      const fx = Math.floor(Math.random()*COLS);
      const fy = Math.floor(Math.random()*ROWS);
      if(!snake.some(s=>s.x===fx && s.y===fy)){
        food = {x:fx, y:fy};
        valid = true;
      }
    }
  }

  function drawGrid(){
    ctx.strokeStyle = COLOR_GRID;
    ctx.lineWidth = 1;
    for(let i=0;i<=COLS;i++){
      ctx.beginPath();
      ctx.moveTo(i*CELL,0); ctx.lineTo(i*CELL, canvas.height);
      ctx.stroke();
    }
    for(let j=0;j<=ROWS;j++){
      ctx.beginPath();
      ctx.moveTo(0,j*CELL); ctx.lineTo(canvas.width, j*CELL);
      ctx.stroke();
    }
  }

  function roundRect(x,y,w,h,r){
    ctx.beginPath();
    ctx.moveTo(x+r,y);
    ctx.arcTo(x+w,y,x+w,y+h,r);
    ctx.arcTo(x+w,y+h,x,y+h,r);
    ctx.arcTo(x,y+h,x,y,r);
    ctx.arcTo(x,y,x+w,y,r);
    ctx.closePath();
  }

  function heartPath(s){
    // draws a heart centered at 0,0 with rough width/height s
    ctx.beginPath();
    const topCurveHeight = s * 0.3;
    ctx.moveTo(0, topCurveHeight);
    ctx.bezierCurveTo(0, topCurveHeight - s*0.4, -s*0.5, topCurveHeight - s*0.4, -s*0.5, topCurveHeight);
    ctx.bezierCurveTo(-s*0.5, topCurveHeight + s*0.35, 0, topCurveHeight + s*0.65, 0, topCurveHeight + s*0.85);
    ctx.bezierCurveTo(0, topCurveHeight + s*0.65, s*0.5, topCurveHeight + s*0.35, s*0.5, topCurveHeight);
    ctx.bezierCurveTo(s*0.5, topCurveHeight - s*0.4, 0, topCurveHeight - s*0.4, 0, topCurveHeight);
    ctx.closePath();
  }

  function drawFood(t){
    const pulse = 0.5 + 0.5*Math.sin(t/220);
    const cx = food.x*CELL + CELL/2;
    const cy = food.y*CELL + CELL/2;
    const size = CELL*0.62 + pulse*2.5;

    ctx.save();
    ctx.translate(cx, cy - size*0.42);
    ctx.rotate(Math.sin(t/500)*0.12);
    ctx.shadowColor = COLOR_FOOD_GLOW;
    ctx.shadowBlur = 16 + pulse*12;
    const grad = ctx.createLinearGradient(0,-size*0.3,0,size*0.5);
    grad.addColorStop(0, COLOR_FOOD_GLOW);
    grad.addColorStop(1, COLOR_FOOD);
    ctx.fillStyle = grad;
    heartPath(size);
    ctx.fill();
    ctx.lineWidth = 1.2;
    ctx.strokeStyle = 'rgba(255,255,255,0.6)';
    ctx.stroke();
    ctx.restore();
  }

  function drawSnake(){
    for(let i=snake.length-1;i>=0;i--){
      const seg = snake[i];
      const isHead = i===0;
      const x = seg.x*CELL, y = seg.y*CELL;
      const pad = isHead ? 1 : 2;

      let color;
      if(isHead){ color = COLOR_HEAD; }
      else {
        const cyclePos = (i * 0.35) % 3;
        color = cyclePos < 1 ? COLOR_BODY_B : (cyclePos < 2 ? COLOR_BODY_A : COLOR_BODY_C);
      }

      ctx.save();
      ctx.shadowColor = color;
      ctx.shadowBlur = isHead ? 18 : 9;
      ctx.fillStyle = isHead ? '#ffffff' : color;
      ctx.globalAlpha = isHead ? 1 : 0.6 + 0.35*(1-i/snake.length);
      roundRect(x+pad, y+pad, CELL-pad*2, CELL-pad*2, isHead?6:5);
      ctx.fill();
      // sparkle highlight on body segments
      if(!isHead && i%3===0){
        ctx.globalAlpha = 0.8;
        ctx.fillStyle = '#ffffff';
        ctx.beginPath();
        ctx.arc(x+CELL*0.3, y+CELL*0.3, CELL*0.06, 0, Math.PI*2);
        ctx.fill();
      }
      ctx.restore();

      if(isHead){
        // cute wink eyes with pink blush
        ctx.save();
        const ex = x + CELL/2 + dir.x*CELL*0.15;
        const ey = y + CELL/2 + dir.y*CELL*0.15;
        const ox = dir.y!==0 ? CELL*0.18 : 0;
        const oy = dir.x!==0 ? CELL*0.18 : 0;

        ctx.fillStyle = 'rgba(255,0,153,0.35)';
        ctx.beginPath();
        ctx.arc(ex-ox*1.6, ey-oy*1.6, CELL*0.09, 0, Math.PI*2);
        ctx.arc(ex+ox*1.6, ey+oy*1.6, CELL*0.09, 0, Math.PI*2);
        ctx.fill();

        ctx.fillStyle = '#2a0026';
        ctx.beginPath();
        ctx.arc(ex-ox, ey-oy, CELL*0.08, 0, Math.PI*2);
        ctx.arc(ex+ox, ey+oy, CELL*0.08, 0, Math.PI*2);
        ctx.fill();

        ctx.fillStyle = '#ffffff';
        ctx.beginPath();
        ctx.arc(ex-ox-1, ey-oy-1, CELL*0.025, 0, Math.PI*2);
        ctx.arc(ex+ox-1, ey+oy-1, CELL*0.025, 0, Math.PI*2);
        ctx.fill();
        ctx.restore();
      }
    }
  }

  const SPARKLE_COLORS = ['#ff0099', '#ffd93d', '#b967ff', '#ffffff'];

  function spawnParticles(x,y){
    for(let i=0;i<14;i++){
      particles.push({
        x: x*CELL+CELL/2, y: y*CELL+CELL/2,
        vx:(Math.random()-0.5)*5, vy:(Math.random()-0.5)*5 - 1,
        life:1, color: SPARKLE_COLORS[Math.floor(Math.random()*SPARKLE_COLORS.length)]
      });
    }
  }

  function drawParticles(){
    particles.forEach(p=>{
      ctx.save();
      ctx.globalAlpha = Math.max(p.life,0);
      ctx.fillStyle = p.color;
      ctx.shadowColor = p.color;
      ctx.shadowBlur = 10;
      ctx.translate(p.x, p.y);
      ctx.rotate(p.life*3);
      const s = 4 * p.life;
      ctx.beginPath();
      ctx.moveTo(0,-s); ctx.lineTo(s*0.3,-s*0.3); ctx.lineTo(s,0);
      ctx.lineTo(s*0.3,s*0.3); ctx.lineTo(0,s); ctx.lineTo(-s*0.3,s*0.3);
      ctx.lineTo(-s,0); ctx.lineTo(-s*0.3,-s*0.3);
      ctx.closePath();
      ctx.fill();
      ctx.restore();
      p.x += p.vx; p.y += p.vy; p.vy += 0.08; p.life -= 0.035;
    });
    particles = particles.filter(p=>p.life>0);
  }

  function step(){
    dir = nextDir;
    const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};

    // wall collision
    if(head.x<0 || head.x>=COLS || head.y<0 || head.y>=ROWS){
      return gameOver();
    }
    // self collision
    if(snake.some(s=>s.x===head.x && s.y===head.y)){
      return gameOver();
    }

    snake.unshift(head);

    if(head.x===food.x && head.y===food.y){
      score++;
      scoreEl.textContent = String(score).padStart(3,'0');
      spawnParticles(food.x, food.y);
      placeFood();
      if(tickMs>70) tickMs -= 3;
    } else {
      snake.pop();
    }
  }

  let lastTime = 0, acc = 0;
  function loop(t){
    if(!running || paused){ loopHandle = requestAnimationFrame(loop); lastTime = t; return; }
    const dt = t - lastTime;
    lastTime = t;
    acc += dt;

    if(acc >= tickMs){
      acc = 0;
      step();
    }

    ctx.clearRect(0,0,canvas.width,canvas.height);
    drawGrid();
    if(running){
      drawFood(t);
      drawSnake();
      drawParticles();
    }
    loopHandle = requestAnimationFrame(loop);
  }

  function gameOver(){
    running = false;
    if(score > high){
      high = score;
      localStorage.setItem('neonSerpentHigh', String(high));
      highEl.textContent = String(high).padStart(3,'0');
    }
    overlayTitle.textContent = '妝花了 // GAME OVER';
    document.querySelector('.overlay p').innerHTML =
      `這輪吃到愛心: <span class="kbd">${score}</span> 顆<br>紀錄已補妝更新<br>要不要再嗨一輪？`;
    startBtn.textContent = '重新出發 RETRY ✨';
    overlay.classList.remove('hidden');
  }

  function startGame(){
    resetState();
    running = true;
    paused = false;
    overlay.classList.add('hidden');
  }

  function setDir(nx, ny){
    if(!running) return;
    // prevent reversing into self
    if(snake.length>1 && dir.x===-nx && dir.y===-ny) return;
    if(nx===dir.x && ny===dir.y && false) return;
    nextDir = {x:nx, y:ny};
  }

  window.addEventListener('keydown', (e)=>{
    switch(e.key){
      case 'ArrowUp': case 'w': case 'W': setDir(0,-1); e.preventDefault(); break;
      case 'ArrowDown': case 's': case 'S': setDir(0,1); e.preventDefault(); break;
      case 'ArrowLeft': case 'a': case 'A': setDir(-1,0); e.preventDefault(); break;
      case 'ArrowRight': case 'd': case 'D': setDir(1,0); e.preventDefault(); break;
      case ' ':
        if(running){ paused = !paused; }
        e.preventDefault();
        break;
    }
  }, {passive:false});

  document.getElementById('tp-up').addEventListener('click', ()=>setDir(0,-1));
  document.getElementById('tp-down').addEventListener('click', ()=>setDir(0,1));
  document.getElementById('tp-left').addEventListener('click', ()=>setDir(-1,0));
  document.getElementById('tp-right').addEventListener('click', ()=>setDir(1,0));

  startBtn.addEventListener('click', startGame);

  // swipe support
  let touchStartX=0, touchStartY=0;
  canvas.addEventListener('touchstart', (e)=>{
    const t = e.touches[0];
    touchStartX = t.clientX; touchStartY = t.clientY;
  }, {passive:true});
  canvas.addEventListener('touchend', (e)=>{
    const t = e.changedTouches[0];
    const dx = t.clientX - touchStartX;
    const dy = t.clientY - touchStartY;
    if(Math.abs(dx) > Math.abs(dy)){
      if(Math.abs(dx) > 20) setDir(dx>0?1:-1, 0);
    } else {
      if(Math.abs(dy) > 20) setDir(0, dy>0?1:-1);
    }
  }, {passive:true});

  // ambient background glitter
  const glitterHost = document.getElementById('glitter');
  for(let i=0;i<24;i++){
    const dot = document.createElement('span');
    dot.style.left = Math.random()*100 + 'vw';
    dot.style.top = Math.random()*100 + 'vh';
    dot.style.animationDelay = (Math.random()*3.5) + 's';
    dot.style.animationDuration = (2.5 + Math.random()*3) + 's';
    if(Math.random() > 0.6) dot.style.background = 'var(--hot-pink)';
    if(Math.random() > 0.8) dot.style.background = 'var(--neon-purple)';
    glitterHost.appendChild(dot);
  }

  // initial render (idle grid)
  running = false;
  resetState();
  requestAnimationFrame(loop);
})();
</script>

</body>
</html>
